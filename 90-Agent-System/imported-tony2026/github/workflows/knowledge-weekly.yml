name: Knowledge Weekly Digest

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  weekly:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run weekly knowledge automation
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          FEISHU_WEBHOOK_SECRET: ${{ secrets.FEISHU_WEBHOOK_SECRET }}
          WECOM_WEBHOOK_URL: ${{ secrets.WECOM_WEBHOOK_URL }}
          BARK_ENDPOINT: ${{ secrets.BARK_ENDPOINT }}
        run: python scripts/knowledge_weekly.py

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          branch: agent/weekly-knowledge-digest
          title: "Weekly knowledge digest"
          body: "Generated weekly knowledge digest, study queue, candidates, and vault health report."
          commit-message: "chore: generate weekly knowledge digest"
          delete-branch: true
